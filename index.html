t cBg  = v => v==="Dépassé"?"#dcfce7":v==="Acquis"?"#ecfccb":v==="En cours"?"#fef9c3":"#fee2e2";\nconst latI = l => l==="Gaucher"?"✋":l==="Ambidextre"?"🤲":"🤚";\nconst latC = l => l==="Gaucher"?"#8b5cf6":l==="Ambidextre"?"#10b981":"#3b82f6";\nconst ini  = e => `${e.pre[0]}${e.nom[0]}`;\nconst fmtD = d => d ? new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"long"}) : "—";\nconst fmtS = d => d ? new Date(d).toLocaleDateString("fr-FR",{day:"numeric",month:"short"}) : "—";\n\n// ─── COMPOSANTS UI ─────────────────────────────────────────────────────────────\nconst Av = ({lbl,size=32,color="#6366f1"}) => (\n  <div style={{width:size,height:size,borderRadius:"50%",background:color+"18",border:`2px solid ${color}30`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.31,fontWeight:800,color,flexShrink:0}}>\n    {lbl}\n  </div>\n);\n\nconst Bdg = ({c="#6366f1",sm,children}) => (\n  <span style={{display:"inline-flex",alignItems:"center",padding:sm?"1px 6px":"2px 9px",borderRadius:20,fontSize:sm?10:11,fontWeight:700,background:c+"18",color:c,whiteSpace:"nowrap"}}>\n    {children}\n  </span>\n);\n\nconst Card = ({children,style={}}) => (\n  <div style={{background:"#fff",borderRadius:16,padding:20,border:"1px solid #e8ecf4",boxShadow:"0 1px 6px rgba(0,0,0,.04)",...style}}>\n    {children}\n  </div>\n);\n\nconst Btn = ({children,onClick,v="primary",sm,style={}}) => (\n  <button onClick={onClick} style={{padding:sm?"5px 12px":"8px 18px",borderRadius:10,border:v==="ghost"?"2px solid #6366f1":"none",background:v==="primary"?"#6366f1":v==="red"?"#dc2626":v==="ghost"?"transparent":"#f1f5f9",color:v==="ghost"?"#6366f1":v==="light"?"#374151":"#fff",fontWeight:700,fontSize:sm?12:13,fontFamily:"inherit",cursor:"pointer",...style}}>\n    {children}\n  </button>\n);\n\nconst BarEl = ({value,max=20,color}) => (\n  <div style={{width:"100%",height:5,background:"#f1f5f9",borderRadius:3,overflow:"hidden"}}>\n    <div style={{width:`${Math.min(value/max*100,100)}%`,height:"100%",background:color||nCol(value),borderRadius:3}}/>\n  </div>\n);\n\nconst inp = {width:"100%",padding:"9px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,fontFamily:"inherit",outline:"none",color:"#1e293b",boxSizing:"border-box",background:"#fff"};\nconst Lbl = ({children}) => <label style={{display:"block",fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{children}</label>;\nconst FRow = ({label,children}) => <div style={{marginBottom:13}}>{label&&<Lbl>{label}</Lbl>}{children}</div>;\n\n// Modal générique\nconst Modal = ({title,onClose,onSave,saveLabel="Enregistrer",vc="primary",wide,children}) => (\n  <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}\n    onClick={e=>{if(e.target===e.currentTarget)onClose();}}>\n    <div style={{background:"#fff",borderRadius:20,padding:26,width:wide?640:410,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 25px 60px rgba(0,0,0,.2)"}}>\n      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>\n        <h2 style={{fontSize:18,fontWeight:800,color:"#1e293b"}}>{title}</h2>\n        <button onClick={onClose} style={{width:30,height:30,borderRadius:"50%",border:"none",background:"#f1f5f9",cursor:"pointer",fontSize:15,color:"#64748b",fontFamily:"inherit"}}>✕</button>\n      </div>\n      {children}\n      {onSave&&<div style={{display:"flex",gap:9,marginTop:8,paddingTop:14,borderTop:"1px solid #f1f5f9"}}><Btn onClick={onSave} v={vc}>{saveLabel}</Btn><Btn onClick={onClose} v="light">Annuler</Btn></div>}\n    </div>\n  </div>\n);\n\n// Tabs internes\nconst Tabs = ({tabs,active,onSelect}) => (\n  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:18}}>\n    {tabs.map(t=>(\n      <button key={t.k} onClick={()=>onSelect(t.k)}\n        style={{padding:"7px 14px",borderRadius:9,border:"2px solid",borderColor:active===t.k?"#6366f1":"#e2e8f0",background:active===t.k?"#6366f1":"#fff",color:active===t.k?"#fff":"#374151",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>\n        {t.l}\n      </button>\n    ))}\n  </div>\n);\n\n// ─── APP ───────────────────────────────────────────────────────────────────────\nexport default function App() {\n  // ── Données persistantes (sauvegardées automatiquement) ──\n  const [eleves, setEleves] = useSaved("eleves", EL0);\n  const [notes,  setNotes]  = useSaved("notes",  genNotes);\n  const [devoirs,setDevoirs]= useSaved("devoirs", DEVOIRS_INIT);\n  const [disc,   setDisc]   = useSaved("disc",    DISC_INIT);\n  const [rdv,    setRdv]    = useSaved("rdv",     RDV_INIT);\n  const [sorties,setSorties]= useSaved("sorties", SORTIES_INIT);\n  const [edt,    setEdt]    = useSaved("edt",     EDT_INIT);\n  const [sante,   setSante]   = useSaved("sante",   ()=>{ const s={}; EL0.forEach(e=>{s[e.id]={...defSante(),...(SANTE_INIT[e.id]||{})};}); return s; });\n  const [parents, setParents] = useSaved("parents", ()=>{ const p={}; EL0.forEach(e=>{p[e.id]={...defParent(),...(PARENT_INIT[e.id]||{})};}); return p; });\n  const [appre,   setAppre]   = useSaved("appre",   ()=>{ const a={}; EL0.forEach(e=>{a[e.id]=defAppre();}); return a; });\n  const [lecture, setLecture] = useSaved("lecture", ()=>{ const l={}; EL0.forEach((e,i)=>{l[e.id]={niv:NIV_L[Math.min(i%5+1,4)],vit:80+Math.floor(Math.random()*60),obs:""};}); return l; });\n  const [comps,   setComps]   = useSaved("comps",   ()=>{ const c={}; EL0.forEach(e=>{c[e.id]=defComps();}); return c; });\n\n  // Navigation\n  const [pg,     setPg]    = useState("accueil");\n  const [fId,    setFId]   = useState(null);\n  const [fTab,   setFTab]  = useState("profil");\n\n  // États des pages\n  const [trim,   setTrim]  = useState("T1");\n  const [agTab,  setAgTab] = useState("edt");\n  const [sq,     setSq]    = useState("");\n  const [sortE,  setSortE] = useState("nom");\n  const [planV,  setPlanV] = useState("liste");\n  const [filtDisc,setFD]   = useState("tous");\n  const [filtRdv, setFR]   = useState("tous");\n\n  // Modales\n  const [mdl,  setMdl]  = useState(null);\n  const [mE,   setME]   = useState({nom:"",pre:"",ne:"",lat:"Droitier",grp:"A"});\n  const [mDev, setMDev] = useState({titre:"",mat:"Français",trim:"T1",date:""});\n  const [mDi,  setMDi]  = useState({eid:"",date:new Date().toISOString().slice(0,10),type:"Bavardage",desc:"",grav:1,sanct:false,stxt:""});\n  const [mRdv, setMRdv] = useState({eid:"",date:"",h:"",type:"Médecin scolaire",lieu:"",motif:"",statut:"Confirmé"});\n  const [mSo,  setMSo]  = useState({titre:"",date:"",lieu:"",nb:20,budget:0,statut:"En attente",notes:""});\n  const [mNt,  setMNt]  = useState(null);\n  const [mNtV, setMNtV] = useState("");\n  const [mLia, setMLia] = useState({eid:"",objet:"",msg:""});\n\n  // ── Calculs ──\n  const ea  = id => { const v=[]; MAT.forEach(m=>TRI.forEach(t=>{const n=notes[id]?.[m]?.[t]; if(n!=null)v.push(n);})); return avg(v); };\n  const ca  = useMemo(()=>{ const v=[]; eleves.forEach(e=>MAT.forEach(m=>TRI.forEach(t=>{const n=notes[e.id]?.[m]?.[t]; if(n!=null)v.push(n);}))); return avg(v); },[eleves,notes]);\n  const ma  = m => avg(eleves.map(e=>avg(TRI.map(t=>notes[e.id]?.[m]?.[t]).filter(n=>n!=null))).filter(n=>n!=null));\n  const iE  = id => disc.filter(d=>d.eid===id).length;\n  const upR = [...rdv].filter(r=>new Date(r.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date));\n  const pap = Object.values(sante).filter(s=>s.pap).length;\n  const pai = Object.values(sante).filter(s=>s.pai).length;\n  const E   = id => eleves.find(e=>e.id===id);\n\n  const filtE = useMemo(()=>{\n    const q=sq.toLowerCase();\n    return eleves.filter(e=>`${e.nom} ${e.pre}`.toLowerCase().includes(q)).sort((a,b)=>{\n      if(sortE==="avg") return (ea(b.id)||0)-(ea(a.id)||0);\n      if(sortE==="abs") return b.abs-a.abs;\n      if(sortE==="inc") return iE(b.id)-iE(a.id);\n      return (a[sortE]||"").localeCompare(b[sortE]||"");\n    });\n  },[eleves,notes,disc,sq,sortE]);\n\n  // ── Actions ──\n  const goF  = (id,tab="profil") => { setFId(id); setFTab(tab); setPg("fiche"); };\n  const upS  = (id,f,v) => setSante(s=>({...s,[id]:{...s[id],[f]:v}}));\n  const upP  = (id,f,v) => setParents(p=>({...p,[id]:{...p[id],[f]:v}}));\n  const upC  = (eid,m,c,v) => setComps(cs=>({...cs,[eid]:{...cs[eid],[m]:{...cs[eid][m],[c]:v}}}));\n  const togD = (did,eid) => setDevoirs(d=>d.map(x=>x.id!==did?x:{...x,fait:{...x.fait,[eid]:!x.fait[eid]}}));\n\n  const doAddE = () => {\n    if(!mE.nom||!mE.pre) return;\n    const id = Math.max(...eleves.map(e=>e.id))+1;\n    setEleves([...eleves,{...mE,id,abs:0,note:"",r:6,c:1}]);\n    setNotes(n=>{const r=JSON.parse(JSON.stringify(n));r[id]={};MAT.forEach(m=>{r[id][m]={};TRI.forEach(t=>{r[id][m][t]=null;});});return r;});\n    setSante(s=>({...s,[id]:defSante()}));\n    setParents(p=>({...p,[id]:defParent()}));\n    setAppre(a=>({...a,[id]:defAppre()}));\n    setLecture(l=>({...l,[id]:defLecture()}));\n    setComps(c=>({...c,[id]:defComps()}));\n    setME({nom:"",pre:"",ne:"",lat:"Droitier",grp:"A"}); setMdl(null);\n  };\n  const doAddDev = () => { if(!mDev.titre||!mDev.date)return; setDevoirs([...devoirs,{...mDev,id:Date.now(),fait:{}}]); setMDev({titre:"",mat:"Français",trim:"T1",date:""}); setMdl(null); };\n  const doAddDi  = () => { if(!mDi.eid||!mDi.desc)return; setDisc([...disc,{...mDi,id:Date.now(),eid:parseInt(mDi.eid),grav:parseInt(mDi.grav)}]); setMDi({eid:"",date:new Date().toISOString().slice(0,10),type:"Bavardage",desc:"",grav:1,sanct:false,stxt:""}); setMdl(null); };\n  const doAddRdv = () => { if(!mRdv.eid||!mRdv.date)return; setRdv([...rdv,{...mRdv,id:Date.now(),eid:parseInt(mRdv.eid)}]); setMRdv({eid:"",date:"",h:"",type:"Médecin scolaire",lieu:"",motif:"",statut:"Confirmé"}); setMdl(null); };\n  const doAddSo  = () => { if(!mSo.titre||!mSo.date)return; setSorties([...sorties,{...mSo,id:Date.now()}]); setMSo({titre:"",date:"",lieu:"",nb:20,budget:0,statut:"En attente",notes:""}); setMdl(null); };\n  const doNote   = () => { const v=parseFloat(mNtV.replace(",",".")); if(isNaN(v)||v<0||v>20)return; setNotes(n=>{const r=JSON.parse(JSON.stringify(n));r[mNt.eid][mNt.mat][mNt.trim]=v;return r;}); setMdl(null); };\n\n  // ── Modales ──\n  const eOpts = [{v:"",l:"-- Choisir un élève --"},...eleves.map(e=>({v:e.id,l:`${e.pre} ${e.nom}`}))];\n\n  const Modals = () => {\n    if(!mdl) return null;\n    const SI = (lbl,val,fn,type="text",ph) => <FRow label={lbl}><input type={type} value={val} onChange={fn} placeholder={ph} style={inp}/></FRow>;\n    const SS = (lbl,val,fn,opts) => <FRow label={lbl}><select value={val} onChange={fn} style={inp}>{opts.map(o=><option key={o.v!==undefined?o.v:o} value={o.v!==undefined?o.v:o}>{o.l||o}</option>)}</select></FRow>;\n    const ST = (lbl,val,fn,rows=3,ph) => <FRow label={lbl}><textarea value={val} onChange={fn} placeholder={ph} rows={rows} style={{...inp,resize:"vertical"}}/></FRow>;\n\n    if(mdl==="eleve") return (\n      <Modal title="👧 Nouvel élève" onClose={()=>setMdl(null)} onSave={doAddE} saveLabel="Ajouter">\n        {SI("Prénom",mE.pre,e=>setME({...mE,pre:e.target.value}),"text","Prénom de l\'élève")}\n        {SI("Nom",mE.nom,e=>setME({...mE,nom:e.target.value}),"text","Nom de famille")}\n        {SI("Date de naissance",mE.ne,e=>setME({...mE,ne:e.target.value}),"date")}\n        {SS("Latéralité",mE.lat,e=>setME({...mE,lat:e.target.value}),["Droitier","Gaucher","Ambidextre"])}\n        {SS("Groupe de travail",mE.grp,e=>setME({...mE,grp:e.target.value}),["A","B","C"])}\n      </Modal>\n    );\n    if(mdl==="devoir") return (\n      <Modal title="📚 Nouveau devoir" onClose={()=>setMdl(null)} onSave={doAddDev}>\n        {SI("Titre du devoir",mDev.titre,e=>setMDev({...mDev,titre:e.target.value}),"text","Ex : Dictée n°6, Exercices sur les fractions…")}\n        {SS("Matière",mDev.mat,e=>setMDev({...mDev,mat:e.target.value}),MAT)}\n        {SS("Trimestre",mDev.trim,e=>setMDev({...mDev,trim:e.target.value}),TRI)}\n        {SI("Date à rendre",mDev.date,e=>setMDev({...mDev,date:e.target.value}),"date")}\n      </Modal>\n    );\n    if(mdl==="disc") return (\n      <Modal title="⚠️ Signaler un incident" onClose={()=>setMdl(null)} onSave={doAddDi} vc="red">\n        {SS("Élève concerné",mDi.eid,e=>setMDi({...mDi,eid:e.target.value}),eOpts)}\n        {SI("Date",mDi.date,e=>setMDi({...mDi,date:e.target.value}),"date")}\n        {SS("Type d\'incident",mDi.type,e=>setMDi({...mDi,type:e.target.value}),DISC_T)}\n        {ST("Description",mDi.desc,e=>setMDi({...mDi,desc:e.target.value}),3,"Décrivez brièvement l\'incident…")}\n        {SS("Niveau de gravité",mDi.grav,e=>setMDi({...mDi,grav:e.target.value}),[{v:1,l:"① Léger (bavardage, oubli…)"},{v:2,l:"② Modéré (perturbation…)"},{v:3,l:"③ Grave (bagarre, insolence…)"}])}\n        <FRow>\n          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 14px",borderRadius:10,background:"#f8fafc",border:"1.5px solid #e2e8f0"}}>\n            <input type="checkbox" checked={mDi.sanct} onChange={e=>setMDi({...mDi,sanct:e.target.checked})} style={{width:16,height:16}}/>\n            <span style={{fontSize:14,fontWeight:600,color:"#374151"}}>Une sanction a été donnée</span>\n          </label>\n        </FRow>\n        {mDi.sanct && SI("Sanction appliquée",mDi.stxt,e=>setMDi({...mDi,stxt:e.target.value}),"text","Ex : Mot dans le carnet, copie, convocation…")}\n      </Modal>\n    );\n    if(mdl==="rdv") return (\n      <Modal title="🏥 Nouveau rendez-vous" onClose={()=>setMdl(null)} onSave={doAddRdv}>\n        {SS("Élève",mRdv.eid,e=>setMRdv({...mRdv,eid:e.target.value}),eOpts)}\n        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>\n          <FRow label="Date"><input type="date" value={mRdv.date} onChange={e=>setMRdv({...mRdv,date:e.target.value})} style={inp}/></FRow>\n          <FRow label="Heure"><input type="time" value={mRdv.h} onChange={e=>setMRdv({...mRdv,h:e.target.value})} style={inp}/></FRow>\n        </div>\n        {SS("Type de rendez-vous",mRdv.type,e=>setMRdv({...mRdv,type:e.target.value}),RDV_T)}\n        {SI("Lieu",mRdv.lieu,e=>setMRdv({...mRdv,lieu:e.target.value}),"text","Ex : Infirmerie, Cabinet Dr Martin…")}\n        {SI("Motif",mRdv.motif,e=>setMRdv({...mRdv,motif:e.target.value}),"text","Ex : Visite annuelle, bilan…")}\n        {SS("Statut",mRdv.statut,e=>setMRdv({...mRdv,statut:e.target.value}),["Confirmé","En attente","Annulé"])}\n      </Modal>\n    );\n    if(mdl==="sortie") return (\n      <Modal title="🚌 Nouvelle sortie scolaire" onClose={()=>setMdl(null)} onSave={doAddSo}>\n        {SI("Intitulé",mSo.titre,e=>setMSo({...mSo,titre:e.target.value}),"text","Ex : Visite du musée, Spectacle…")}\n        {SI("Date",mSo.date,e=>setMSo({...mSo,date:e.target.value}),"date")}\n        {SI("Lieu",mSo.lieu,e=>setMSo({...mSo,lieu:e.target.value}),"text","Nom et adresse")}\n        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>\n          <FRow label="Nombre d\'élèves"><input type="number" value={mSo.nb} onChange={e=>setMSo({...mSo,nb:parseInt(e.target.value)||0})} style={inp}/></FRow>\n          <FRow label="Budget (€/élève)"><input type="number" value={mSo.budget} onChange={e=>setMSo({...mSo,budget:parseFloat(e.target.value)||0})} style={inp}/></FRow>\n        </div>\n        {SS("Statut",mSo.statut,e=>setMSo({...mSo,statut:e.target.value}),["En attente","Confirmée","Annulée"])}\n        {ST("Notes",mSo.notes,e=>setMSo({...mSo,notes:e.target.value}),2,"Informations pratiques, accompagnateurs…")}\n      </Modal>\n    );\n    if(mdl==="note") return (\n      <Modal title="✏️ Modifier une note" onClose={()=>setMdl(null)} onSave={doNote}>\n        <div style={{textAlign:"center",marginBottom:18}}>\n          <div style={{fontSize:16,fontWeight:700,color:"#374151",marginBottom:3}}>{mNt?.pre} {mNt?.nom}</div>\n          <div style={{fontSize:13,color:"#6b7280"}}>{mNt?.mat} — Trimestre {mNt?.trim?.replace("T","")}</div>\n        </div>\n        <div style={{textAlign:"center"}}>\n          <input value={mNtV} onChange={e=>setMNtV(e.target.value)} placeholder="0 à 20" autoFocus\n            onKeyDown={k=>{if(k.key==="Enter")doNote();}}\n            style={{width:140,padding:"12px 18px",fontSize:30,fontWeight:900,textAlign:"center",borderRadius:14,border:"2px solid #c7d2fe",outline:"none",color:"#6366f1",fontFamily:"inherit"}}/>\n          <p style={{marginTop:8,fontSize:12,color:"#9ca3af"}}>Appuyez sur Entrée pour valider</p>\n        </div>\n      </Modal>\n    );\n    if(mdl==="liaison") return (\n      <Modal title="✉️ Fiche de liaison parents-école" onClose={()=>setMdl(null)} wide>\n        {(()=>{\n          const SS2=(lbl,val,fn,opts)=><FRow label={lbl}><select value={val} onChange={fn} style={inp}>{opts.map(o=><option key={o.v!==undefined?o.v:o} value={o.v!==undefined?o.v:o}>{o.l||o}</option>)}</select></FRow>;\n          const SI2=(lbl,val,fn,ph)=><FRow label={lbl}><input value={val} onChange={fn} placeholder={ph} style={inp}/></FRow>;\n          const ST2=(lbl,val,fn,rows,ph)=><FRow label={lbl}><textarea value={val} onChange={fn} placeholder={ph} rows={rows} style={{...inp,resize:"vertical"}}/></FRow>;\n          const el = E(parseInt(mLia.eid));\n          return (\n            <>\n              {SS2("Élève concerné",mLia.eid,e=>setMLia({...mLia,eid:e.target.value}),eOpts)}\n              {SI2("Objet du message",mLia.objet,e=>setMLia({...mLia,objet:e.target.value}),"Ex : Comportement, résultats du trimestre…")}\n              {ST2("Message pour les parents",mLia.msg,e=>setMLia({...mLia,msg:e.target.value}),6,"Rédigez votre message ici…")}\n              {mLia.eid && mLia.msg && (\n                <div style={{background:"#f8f9ff",border:"1.5px solid #c7d2fe",borderRadius:14,padding:16,fontSize:13,marginTop:4}}>\n                  <div style={{fontWeight:800,color:"#6366f1",marginBottom:10}}>📄 Aperçu de la fiche</div>\n                  <div style={{fontWeight:700,marginBottom:4}}>À l\'attention des parents de {el?.pre} {el?.nom}</div>\n                  <div style={{color:"#6b7280",marginBottom:10}}>Date : {new Date().toLocaleDateString("fr-FR")} &nbsp;·&nbsp; Objet : {mLia.objet}</div>\n                  <p style={{lineHeight:1.7,whiteSpace:"pre-wrap"}}>{mLia.msg}</p>\n                  <div style={{marginTop:12,borderTop:"1px solid #e2e8f0",paddingTop:10,color:"#9ca3af",fontSize:11}}>\n                    Signature enseignant(e) : _______________ &nbsp;&nbsp;&nbsp; Signature des parents : _______________\n                  </div>\n                </div>\n              )}\n              <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid #f1f5f9"}}><Btn onClick={()=>setMdl(null)}>Fermer</Btn></div>\n            </>\n          );\n        })()}\n      </Modal>\n    );\n    return null;\n  };\n\n  // ══════════════════════════════════════════════════════════════════════════════\n  // PAGE ACCUEIL\n  // ══════════════════════════════════════════════════════════════════════════════\n  const PageAccueil = () => {\n    const top  = [...eleves].sort((a,b)=>(ea(b.id)||0)-(ea(a.id)||0)).slice(0,4);\n    const help = [...eleves].sort((a,b)=>(ea(a.id)||0)-(ea(b.id)||0)).slice(0,3);\n    const inc7 = disc.filter(d=>new Date(d.date)>new Date(Date.now()-7*864e5));\n    return (\n      <div>\n        {/* Bannière */}\n        <div style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:20,padding:"26px 30px",color:"#fff",marginBottom:22,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>\n          <div>\n            <div style={{fontSize:13,opacity:.8,marginBottom:3}}>Dimanche 15 mars 2026</div>\n            <h1 style={{fontSize:24,fontWeight:900,marginBottom:4}}>Bonjour, Maîtresse 👋</h1>\n            <p style={{fontSize:13,opacity:.85}}>CM1 &nbsp;·&nbsp; {eleves.length} élèves &nbsp;·&nbsp; Année 2025-2026</p>\n          </div>\n          <div style={{display:"flex",gap:22,textAlign:"center"}}>\n            {[{v:ca?`${ca}/20`:"—",l:"Moy. classe"},{v:pap,l:"PAP"},{v:pai,l:"PAI"},{v:upR.length,l:"RDV à venir"}].map(s=>(\n              <div key={s.l}><div style={{fontSize:24,fontWeight:900}}>{s.v}</div><div style={{fontSize:11,opacity:.75}}>{s.l}</div></div>\n            ))}\n          </div>\n        </div>\n\n        <div style={{display:"grid",gridTemplateColumns:"1.3fr 1fr 1fr",gap:16,marginBottom:18}}>\n          {/* Moyennes */}\n          <Card>\n            <h3 style={{fontSize:14,fontWeight:800,marginBottom:14,color:"#374151"}}>📊 Moyennes par matière</h3>\n            {MAT.map(m=>{const a=ma(m);return(\n              <div key={m} style={{marginBottom:10}}>\n                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>\n                  <span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{m}</span>\n                  <span style={{fontSize:13,fontWeight:700,color:a?nCol(a):"#9ca3af"}}>{a?`${a}/20`:"—"}</span>\n                </div>\n                {a && <BarEl value={a} color={MC[m]}/>}\n              </div>\n            );})}\n          </Card>\n\n          {/* Top + aide */}\n          <Card>\n            <h3 style={{fontSize:14,fontWeight:800,marginBottom:12,color:"#374151"}}>🏆 Top élèves</h3>\n            {top.map((e,i)=>{const a=ea(e.id);return(\n              <div key={e.id} onClick={()=>goF(e.id)} style={{display:"flex",alignItems:"center",gap:9,marginBottom:10,cursor:"pointer",padding:"6px 9px",borderRadius:10,background:i===0?"#f5f3ff":"transparent"}}>\n                <div style={{width:20,height:20,borderRadius:"50%",background:["#f59e0b","#94a3b8","#cd7f32","#e2e8f0"][i],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,color:"#fff",flexShrink:0}}>{i+1}</div>\n                <Av lbl={ini(e)} size={26} color="#6366f1"/>\n                <span style={{flex:1,fontSize:12,fontWeight: xDirection:"column",alignItems:"center",justifyContent:"center",position:"relative",transition:"border-color .2s"}}>\n                        {hasAlert&&e&&<div style={{position:"absolute",top:5,right:5,width:8,height:8,borderRadius:"50%",background:"#dc2626"}}/>}\n                        {e ? (\n                          <div draggable onDragStart={ev=>ev.dataTransfer.setData("eid",e.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",cursor:"grab",userSelect:"none"}} onClick={()=>goF(e.id)}>\n                            <Av lbl={ini(e)} size={30} color={latC(e.lat)}/>\n                            <div style={{fontSize:11,fontWeight:700,marginTop:5,color:"#1e293b"}}>{e.pre}</div>\n                            <div style={{fontSize:10,color:"#6b7280"}}>{e.nom}</div>\n                            <div style={{display:"flex",gap:3,marginTop:3}}>\n                              {e.lat==="Gaucher"&&<Bdg c="#8b5cf6" sm>G</Bdg>}\n                              {s.vue&&<span style={{fontSize:11}}>👓</span>}\n                              {s.aud&&<span style={{fontSize:11}}>👂</span>}\n                            </div>\n                          </div>\n                        ):(\n                          <span style={{color:"#d1d5db",fontSize:12}}>Libre</span>\n                        )}\n                      </div>\n                    );\n                  })}\n                </div>\n              ))}\n            </div>\n            <p style={{textAlign:"center",color:"#9ca3af",fontSize:12,marginBottom:18}}>💡 Glissez-déposez pour repositionner les élèves · Cliquez pour ouvrir la fiche</p>\n            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>\n              {["A","B","C"].map(g=>(\n                <Card key={g}>\n                  <h3 style={{fontWeight:800,fontSize:14,marginBottom:10}}>Groupe {g} <span style={{color:"#9ca3af",fontWeight:400}}>({eleves.filter(e=>e.grp===g).length} élèves)</span></h3>\n                  <     {m.slice(0,8)}\n                </th>\n              ))}\n              <th style={{textAlign:"center",padding:"12px 6px",fontWeight:800,color:"#6366f1",fontSize:12}}>Moy.</th>\n            </tr>\n          </thead>\n          <tbody>\n            {eleves.map((e,i)=>{\n              const tN = MAT.map(m=>notes[e.id]?.[m]?.[trim]);\n              const tA = avg(tN.filter(n=>n!=null));\n              return (\n                <tr key={e.id} style={{borderBottom:"1px solid #f8fafc",background:i%2?"#fafbff":"#fff"}}>\n                  <td style={{padding:"10px 16px"}}>\n                    <div style={{display:"flex",alignItems:"center",gap:9}}>\n                      <Av lbl={ini(e)} size={24} color="#6366f1"/>\n                      <span style={{fontWeight:600,color:"#1e293b"}}>{e.pre} {e.nom}</span>\n                    </div>\n                  </td>\n                  {MAT.map(m=>{\n                    const n=notes[e.id]?.[m]?.[trim];\n                    return (\n                      <td key={m} style={{textAlign:"center",padding:"10px 4px"}}>\n                        <button\n                          onClick={()=>{setMNt({eid:e.id,nom:e.nom,pre:e.pre,mat:m,trim});setMNtV(n!=null?String(n):"");setMdl("note");}}\n                          style={{background:n!=null?nBg(n):"#f8fafc",color:n!=null?nCol(n):"#9ca3af",border:"none",borderRadius:8,padding:"5px 7px",cursor:"pointer",fontWeight:700,fontSize:13,minWidth:42,fontFamily:"inherit",transition:"transform .1s"}}\n                          title="Cliquer pour modifier">\n                          {n!=null?n:"—"}\n                        </button>\n                      </td>\n                    );\n                  })}\n                  <td style={{textAlign:"center",padding:"10px 6px"}}>\n                    {tA ? <Bdg c={nCol(tA)}>{tA}/20</Bdg> : <span style={{color:"#9ca3af"}}>—</span>}\n                  </td>\n                </tr>\n              );\n            })}\n            <tr style={{background:"#f5f3ff",borderTop:"2px solid #c7d2fe"}}>\n              <td style={{padding:"10px 16px",fontWeight:800,color:"#6366f1",fontSize:13}}>Moy. de la classe</td>\n              {MAT.map(m=>{\n                const a=avg(eleves.map(e=>notes[e.id]?.[m]?.[trim]).filter(n=>n!=null));\n                return <td key={m} style={{textAlign:"center",fontWeight:800,color:a?nCol(a):"#9ca3af"}}>{a||"—"}</td>;\n              })}\n              <td style={{textAlign:"center",fontWeight:800,color:"#6366f1"}}>{ca?`${ca}/20`:"—"}</td>\n            </tr>\n          </tbody>\n        </table>\n      </Card>\n    </div>\n  );\n\n  // ══════════════════════════════════════════════════════════════════════════════\n  // PAGE DEVOIRS\n  // ══════════════════════════════════════════════════════════════════════════════\n  const PageDevoirs = () => (\n    <div>\n      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>\n        <h1 style={{fontSize:22,fontWeight:900,color:"#1e293b"}}>📚 Devoirs</h1>\n        <Btn onClick={()=>setMdl("devoir")}>+ Nouveau devoir</Btn>\n      </div>\n      <div style={{display:"flex",flexDirection:"column",gap:14}}>\n        {[...devoirs].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(d=>{\n          const done=Object.values(d.fait).filter(Boolean).length;\n          const pct=Math.round(done/eleves.length*100);\n          const past=new Date(d.date)<new Date();\n          return (\n            <Card key={d.id}>\n              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12}}>\n                <div>\n                  <div style={{display:"flex",gap:7,marginBottom:7}}>\n                    <Bdg c={MC[d.mat]||"#6366f1"}>{d.mat}</Bdg>\n                    <Bdg c="#94a3b8">{d.trim}</Bdg>\n                    {past&&<Bdg c="#9ca3af">Passé</Bdg>}\n                  </div>\n                  <div style={{fontWeight:800,fontSize:16,color:"#1e293b",marginBottom:3}}>{d.titre}</div>\n                  <div style={{color:"#6b7280",fontSize:13}}>📅 Pour le {fmtD(d.date)}</div>\n                </div>\n                <div style={{textAlign:"center",minWidth:64}}>\n                  <div style={{fontSize:22,fontWeight:900,color:pct===100?"#16a34a":"#6366f1"}}>{pct}%</div>\n                  <div style={{fontSize:11,color:"#9ca3af"}}>{done}/{eleves.length} rendus</div>\n                </div>\n              </div>\n              <BarEl value={done} max={eleves.length} color={pct===100?"#16a34a":"#6366f1"}/>\n              <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:6}}>\n                {eleves.map(e=>(\n                  <button key={e.id} onClick={()=>togD(d.id,e.id)}\n                    style={{padding:"4px 10px",borderRadius:16,border:"1.5px solid",borderColor:d.fait[e.id]?"#86efac":"#e5e7eb",background:d.fait[e.id]?"#f0fdf4":"#f8fafc",color:d.fait[e.id]?"#16a34a":"#9ca3af",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>\n                    {d.fait[e.id]?"✓":"○"} {e.pre}\n                  </button>\n                ))}\n              </div>\n            </Card>\n          );\n        })}\n      </div>\n    </div>\n  );\n\n  // ══════════════════════════════════════════════════════════════════════════════\n  // PAGE DISCIPLINE\n  // ══════════════════════════════════════════════════════════════════════════════\n  const PageDisc = () => {\n    const fil = disc.filter(d=>filtDisc==="tous"||d.eid===parseInt(filtDisc));\n    const stats = {}; eleves.forEach(e=>{stats[e.id]=disc.filter(d=>d.eid===e.id).length;});\n    return (\n      <div>\n        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>\n          <h1 style={{fontSize:22,fontWeight:900,color:"#1e293b"}}>⚠️ Discipline</h1>\n          <Btn v="red" onClick={()=>setMdl("disc")}>+ Signaler un incident</Btn>\n        </div>\n        <div style={{display:"grid",gridTemplateColumns:"260px 1fr",gap:16}}>\n          <div>\n            <Card style={{marginBottom:14}}>\n              <h3 style={{fontSize:14,fontWeight:800,marginBottom:12,color:"#374151"}}>Élèves concernés</h3>\n              {[...eleves].filter(e=>stats[e.id]>0).sort((a,b)=>stats[b.id]-stats[a.id]).map(e=>(\n                <div key={e.id} onClick={()=>setFD(String(e.id))}\n                  style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",borderRadius:10,cursor:"pointer",background:filtDisc===String(e.id)?"#fef2f2":"transparent",marginBottom:4}}>\n                  <Av lbl={ini(e)} size={28} color="#dc2626"/>\n                  <div style={{flex:1}}>\n                    <div style={{fontWeight:700,fontSize:13}}>{e.pre} {e.nom}</div>\n                    <div style={{fontSize:11,color:"#9ca3af"}}>{stats[e.id]} incident(s)</div>\n                  </div>\n                </div>\n              ))}\n              {!Object.values(stats).some(v=>v>0)&&<p style={{color:"#9ca3af",fontSize:13}}>Aucun incident 🎉</p>}\n              {filtDisc!=="tous"&&(\n                <button onClick={()=>setFD("tous")} style={{marginTop:8,fontSize:12,color:"#6366f1",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>← Voir tous</button>\n              )}\n            </Card>\n            <Card>\n              <h3 style={{fontSize:13,fontWeight:800,marginBottom:10,color:"#374151"}}>Par type</h3>\n              {DISC_T.map(t=>{const c=disc.filter(d=>d.type===t).length; if(!c)return null; return(\n                <div key={t} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 0",borderBottom:"1px solid #f8fafc"}}>\n                  <span style={{color:"#374151",fontWeight:500}}>{t}</span>\n                  <span style={{fontWeight:800,color:"#6366f1"}}>{c}</span>\n                </div>\n              );})}\n            </Card>\n          </div>\n          <Card>\n            <h3 style={{fontSize:14,fontWeight:800,color:"#374151",marginBottom:16}}>\n              Historique {filtDisc!=="tous"&&`— ${E(parseInt(filtDisc))?.pre} ${E(parseInt(filtDisc))?.nom}`}\n            </h3>\n            {[...fil].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(d=>{\n              const e=E(d.eid);\n              return (\n                <div key={d.id} style={{display:"flex",gap:14,padding:"14px 0",borderBottom:"1px solid #f8fafc"}}>\n                  <div style={{width:4,borderRadius:2,background:gCol(d.grav),flexShrink:0}}/>\n                  <Av lbl={ini(e||{pre:"?",nom:""})} size={36} color={gCol(d.grav)}/>\n                  <div style={{flex:1}}>\n                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>\n                      <span style={{fontWeight:800,fontSize:14,color:"#1e293b"}}>{e?.pre} {e?.nom}</span>\n                      <Bdg c={gCol(d.grav)}>{gLbl(d.grav)}</Bdg>\n                      <Bdg c="#94a3b8">{d.type}</Bdg>\n                      <span style={{fontSize:12,color:"#9ca3af",marginLeft:"auto"}}>{fmtD(d.date)}</span>\n                    </div>\n                    <p style={{fontSize:13,color:"#374151",marginBottom:4}}>{d.desc}</p>\n                    {d.sanct&&<p style={{fontSize:12,color:"#6b7280",fontStyle:"italic"}}>✏️ Sanction : {d.stxt}</p>}\n                  </div>\n                </div>\n              );\n            })}\n            {fil.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#9ca3af",fontSize:14}}>Aucun incident enregistré 🌟</div>}\n          </Card>\n        </div>\n      </div>\n    );\n  };\n\n  // ══════════════════════════════════════════════════════════════════════════════\n  // PAGE RENDEZ-VOUS\n  // ══════════════════════════════════════════════════════════════════════════════\n  const PageRdv = () => {\n    const fil = [...rdv].filter(r=>filtRdv==="tous"||r.eid===parseInt(filtRdv)).sort((a,b)=>new Date(a.date)-new Date(b.date));\n    return (\n      <div>\n        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>\n          <h1 style={{fontSize:22,fontWeight:900,color:"#1e293b"}}>🏥 Rendez-vous médicaux & scolaires</h1>\n          <Btn onClick={()=>setMdl("rdv")}>+ Ajouter un RDV</Btn>\n        </div>\n        <div style={{marginBottom:16}}>\n          <select value={filtRdv} onChange={e=>setFR(e.target.value)} style={{...inp,width:"auto"}}>\n            <option value="tous">Tous les élèves</option>\n            {eleves.map(e=><option key={e.id} value={e.id}>{e.pre} {e.nom}</option>)}\n          </select>\n        </div>\n        <div style={{display:"flex",flexDirection:"column",gap:10}}>\n          {fil.map(r=>{\n            const e=E(r.eid); const past=new Date(r.date)<new Date();\n            const stC=r.statut==="Confirmé"?"#16a34a":r.statut==="Annulé"?"#dc2626":"#f59e0b";\n            return (\n              <Card key={r.id} style={{display:"flex",alignItems:"center",gap:16,opacity:past?.65:1}}>\n                <div style={{background:"#f5f3ff",borderRadius:12,padding:"10px 14px",textAlign:"center",minWidth:58}}>\n                  <div style={{fontSize:20,fontWeight:900,color:"#6366f1"}}>{new Date(r.date).getDate()}</div>\n                  <div style={{fontSize:10,fontWeight:700,color:"#8b5cf6",textTransform:"uppercase"}}>{new Date(r.date).toLocaleDateString("fr-FR",{month:"short"})}</div>\n                  {r.h&&<div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{r.h}</div>}\n                </div>\n                <Av lbl={ini(e||{pre:"?",nom:""})} size={42} color="#8b5cf6"/>\n                <div style={{flex:1}}>\n                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>\n                    <span style={{fontWeight:800,fontSize:15,color:"#1e293b"}}>{e?.pre} {e?.nom}</span>\n                    <Bdg c="#8b5cf6">{r.type}</Bdg>\n                  </div>\n                  {r.lieu&&<p style={{fontSize:13,color:"#6b7280",marginBottom:2}}>📍 {r.lieu}</p>}\n                  {r.motif&&<p style={{fontSize:13,color:"#374151",fontStyle:"italic"}}>{r.motif}</p>}\n                </div>\n                <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}}>\n                  <Bdg c={stC}>{r.statut}</Bdg>\n                  {past&&<Bdg c="#9ca3af">Passé</Bdg>}\n                </div>\n              </Card>\n            );\n          })}\n          {fil.length===0&&<Card><div style={{textAlign:"center",padding:"40px 0",color:"#9ca3af"}}>Aucun rendez-vous enregistré</div></Card>}\n        </div>\n      </div>\n    );\n  };\n\n  // ══════════════════════════════════════════════════════════════════════════════\n  // PAGE AGENDA (EDT + Calendrier + Sorties)\n  // ══════════════════════════════════════════════════════════════════════════════\n  const PageAgenda = () => (\n    <div>\n      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>\n        <h1 style={{fontSize:22,fontWeight:900,color:"#1e293b"}}>📅 Agenda & Organisation</h1>\n        {agTab==="sorties"&&<Btn onClick={()=>setMdl("sortie")}>+ Nouvelle sortie</Btn>}\n      </div>\n      <Tabs tabs={[{k:"edt",l:"Emploi du temps"},{k:"cal",l:"Calendrier"},{k:"sorties",l:"Sorties scolaires"}]} active={agTab} onSelect={setAgTab}/>\n\n      {agTab==="edt" && (\n        <Card style={{padding:0,overflowX:"auto"}}>\n          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>\n            <thead>\n              <tr style={{background:"#f8fafc",borderBottom:"2px solid #f1f5f9"}}>\n                <th style={{padding:"12px 16px",fontWeight:700,color:"#9ca3af",textAlign:"left",minWidth:72,fontSize:11,textTransform:"uppercase"}}>Heure</th>\n                {JOURS.map(j=><th key={j} style={{padding:"12px 16px",fontWeight:800,color:"#374151",textAlign:"center"}}>{j}</th>)}\n              </tr>\n            </thead>\n            <tbody>\n              {HEURES.map(h=>(\n                <tr key={h} style={{borderBottom:"1px solid #f8fafc"}}>\n                  <td style={{padding:"8px 16px",color:"#9ca3af",fontWeight:700,fontSize:12}}>{h}</td>\n                  {JOURS.map(j=>{\n                    const m=edt[j]?.[h]||""; const mc=m?MC[m]:"transparent";\n                    return (\n                      <td key={j} style={{padding:"5px 7px",textAlign:"center"}}>\n                        <select value={m} onChange={ev=>setEdt(e=>({...e,[j]:{...e[j],[h]:ev.target.value}}))}\n                          style={{background:m?mc+"18":"#f8fafc",color:m?mc:"#9ca3af",border:`1.5px solid ${m?mc+"55":"#e5e7eb"}`,borderRadius:9,padding:"6px 7px",cursor:"pointer",fontWeight:m?700:400,fontSize:12,fontFamily:"inherit",outline:"none",width:"100%",textAlign:"center"}}>\n                          <option value="">—</option>\n                          {MAT.map(mat=><option key={mat} value={mat}>{mat}</option>)}\n                        </select>\n                      </td>\n                    );\n                  })}\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </Card>\n      )}\n\n      {agTab==="cal" && (\n        <Card>\n          <p style={{color:"#9ca3af",fontSize:13,marginBottom:16}}>Événements à venir — RDV, devoirs et sorties</p>\n          <div style={{display:"flex",flexDirection:"column",gap:8}}>\n            {[...sorties,...rdv,...devoirs]\n              .filter(x=>new Date(x.date)>=new Date())\n              .sort((a,b)=>new Date(a.date)-new Date(b.date))\n              .slice(0,20)\n              .map((item,i)=>{\n                const isRdv = "statut" in item && "motif" in item && "eid" in item;\n                const isSo  = "nb" in item;\n                const e = isRdv ? E(item.eid) : null;\n                const color = isRdv?"#8b5cf6":isSo?"#f59e0b":"#6366f1";\n                const icon  = isRdv?"🏥":isSo?"🚌":"📚";\n                const title = isRdv?`${e?.pre} ${e?.nom} — ${item.type}`:item.titre;\n                const sub   = isRdv?item.motif:isSo?item.lieu:item.mat;\n                return (\n                  <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#f8fafc",borderRadius:12}}>\n                    <div style={{background:color+"18",borderRadius:10,padding:"7px 11px",textAlign:"center",minWidth:50}}>\n                      <div style={{fontSize:16,fontWeight:900,color}}>{new Date(item.date).getDate()}</div>\n                      <div style={{fontSize:9,fontWeight:700,color,textTransform:"uppercase"}}>{new Date(item.date).toLocaleDateString("fr-FR",{month:"short"})}</div>\n                    </div>\n                    <span style={{fontSize:18}}>{icon}</span>\n                    <div style={{flex:1}}>\n                      <div style={{fontWeight:700,fontSize:13,color:"#1e293b"}}>{title}</div>\n                      {sub&&<div style={{fontSize:12,color:"#6b7280"}}>{sub}</div>}\n                    </div>\n                    <Bdg c={color}>{isRdv?"RDV":isSo?"Sortie":"Devoir"}</Bdg>\n                  </div>\n                );\n              })}\n          </div>\n        </Card>\n      )}\n\n      {agTab==="sorties" && (\n        <div style={{display:"flex",flexDirection:"column",gap:12}}>\n          {[...sorties].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(s=>{\n            const past=new Date(s.date)<new Date();\n            const stC=s.statut==="Confirmée"?"#16a34a":s.statut==="Annulée"?"#dc2626":"#f59e0b";\n            return (\n              <Card key={s.id} style={{borderLeft:`4px solid ${stC}`,opacity:past?.7:1}}>\n                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>\n                  <div style={{flex:1}}>\n                    <div style={{display:"flex",gap:7,marginBottom:8}}><Bdg c={stC}>{s.statut}</Bdg>{past&&<Bdg c="#9ca3af">Passée</Bdg>}</div>\n                    <h3 style={{fontSize:16,fontWeight:800,color:"#1e293b",marginBottom:4}}>{s.titre}</h3>\n                    <p style={{fontSize:13,color:"#6b7280"}}>📍 {s.lieu} &nbsp;·&nbsp; 📅 {fmtD(s.date)}</p>\n                    {s.notes&&<p style={{fontSize:13,color:"#374151",background:"#f8fafc",padding:"8px 12px",borderRadius:8,marginTop:8,fontStyle:"italic"}}>{s.notes}</p>}\n                  </div>\n                  <div style={{textAlign:"right",marginLeft:20,flexShrink:0}}>\n                    <div style={{fontSize:20,fontWeight:900,color:"#6366f1"}}>{s.nb} élèves</div>\n                    <div style={{fontSize:13,color:"#6b7280"}}>{s.budget} € / élève</div>\n                    <div style={{fontSize:12,color:"#9ca3af",fontWeight:600,marginTop:2}}>Total : {s.budget*s.nb} €</div>\n                  </div>\n                </div>\n              </Card>\n            );\n          })}\n        </div>\n      )}\n    </div>\n  );\n\n  // ══════════════════════════════════════════════════════════════════════════════\n  // PAGE FICHE ÉLÈVE (toutes les infos détaillées)\n  // ══════════════════════════════════════════════════════════════════════════════\n  const PageFiche = () => {\n    const e = E(fId)||eleves[0]; if(!e) return null;\n    const a  = ea(e.id);\n    const s  = sante[e.id]||{};\n    const p  = parents[e.id]||{};\n    const eD = disc.filter(d=>d.eid===e.id);\n    const eR = rdv.filter(r=>r.eid===e.id);\n    const eL = lecture[e.id]||{};\n    const NC = ["#dc2626","#ea580c","#d97706","#65a30d","#16a34a"];\n    const niL = NIV_L.indexOf(eL.niv)||0;\n\n    const TABS = [\n      {k:"profil",   l:"👤 Profil"},\n      {k:"notes",    l:"📝 Notes"},\n      {k:"sante",    l:"🏥 Santé"},\n      {k:"parents",  l:"👨\u200d👩\u200d👧 Parents"},\n      {k:"comps",    l:"🎯 Compétences"},\n      {k:"lecture",  l:"📖 Lecture"},\n      {k:"disc",     l:"⚠️ Discipline"},\n      {k:"rdv",      l:"📅 RDV"},\n      {k:"appre",    l:"💬 Appréciations"},\n    ];\n\n    return (\n      <div>\n        <button onClick={()=>setPg("eleves")} style={{display:"flex",alignItems:"center",gap:6,marginBottom:18,background:"none",border:"none",cursor:"pointer",fontSize:14,fontWeight:600,color:"#6366f1",fontFamily:"inherit"}}>\n          ← Retour à la liste\n        </button>\n\n        {/* Bannière élève */}\n        <div style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:20,padding:"24px 28px",color:"#fff",marginBottom:18,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>\n          <div style={{display:"flex",alignItems:"center",gap:16}}>\n            <div style={{width:56,height:56,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,border:"2px solid rgba(255,255,255,0.35)",flexShrink:0}}>\n              {ini(e)}\n            </div>\n            <div>\n              <h2 style={{fontSize:21,fontWeight:900,marginBottom:4}}>{e.pre} {e.nom}</h2>\n              <div style={{opacity:.85,fontSize:13,display:"flex",gap:12,flexWrap:"wrap"}}>\n                <span>{e.ne?new Date(e.ne).toLocaleDateString("fr-FR"):"—"}</span>\n                <span>{latI(e.lat)} {e.lat}</span>\n                <span>Groupe {e.grp}</span>\n                <span>{e.abs} absence(s)</span>\n              </div>\n              <div style={{display:"flex",gap:5,marginTop:6}}>\n                {s.pap&&<span style={{background:"rgba(255,255,255,0.22)",padding:"2px 8px",borderRadius:8,fontSize:11,fontWeight:700}}>PAP</span>}\n                {s.pai&&<span style={{background:"rgba(255,255,255,0.22)",padding:"2px 8px",borderRadius:8,fontSize:11,fontWeight:700}}>PAI</span>}\n                {s.al?.length>0&&<span style={{background:"rgba(239,68,68,0.4)",padding:"2px 8px",borderRadius:8,fontSize:11,fontWeight:700}}>🚨 Allergie</span>}\n                {s.dys?.map(d=><span key={d} style={{background:"rgba(255,255,255,0.22)",padding:"2px 8px",borderRadius:8,fontSize:11,fontWeight:700}}>{d}</span>)}\n              </div>\n            </div>\n          </div>\n          <div style={{display:"flex",gap:20,textAlign:"center"}}>\n            {[{v:a?`${a}/20`:"—",l:"Moyenne"},{v:eD.length,l:"Incidents"},{v:eR.length,l:"RDV"}].map(x=>(\n              <div key={x.l}><div style={{fontSize:28,fontWeight:900}}>{x.v}</div><div style={{opacity:.75,fontSize:11}}>{x.l}</div></div>\n            ))}\n          </div>\n        </div>\n\n        <Tabs tabs={TABS} active={fTab} onSelect={setFTab}/>\n\n        {/* ── Profil ── */}\n        {fTab==="profil" && (\n          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>\n            <Card>\n              <h3 style={{fontSize:15,fontWeight:800,marginBottom:14,color:"#374151"}}>Informations générales</h3>\n              {[["Nom complet",`${e.pre} ${e.nom}`],["Date de naissance",e.ne?new Date(e.ne).toLocaleDateString("fr-FR"):"—"],["Latéralité",`${latI(e.lat)} ${e.lat}`],["Groupe",`Groupe ${e.grp}`],["Absences",`${e.abs} jour(s)`],["Moyenne générale",a?`${a}/20`:"—"]].map(([k,v])=>(\n                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #f8fafc",fontSize:14}}>\n                  <span style={{color:"#6b7280",fontWeight:600}}>{k}</span>\n                  <span style={{fontWeight:700,color:"#1e293b"}}>{v}</span>\n                </div>\n              ))}\n              <div style={{marginTop:16}}>\n                <FRow label="Notes personnelles">\n                  <textarea value={e.note} onChange={ev=>setEleves(eleves.map(el=>el.id===e.id?{...el,note:ev.target.value}:el))}\n                    placeholder="Observations, points forts, difficultés…" rows={3} style={{...inp,resize:"vertical"}}/>\n                </FRow>\n              </div>\n              <div>\n                <Lbl>Absences</Lbl>\n                <div style={{display:"flex",alignItems:"center",gap:12}}>\n                  <button onClick={()=>setEleves(eleves.map(el=>el.id===e.id?{...el,abs:Math.max(0,el.abs-1)}:el))}\n                    style={{width:36,height:36,borderRadius:"50%",border:"none",background:"#fee2e2",color:"#dc2626",fontSize:20,cursor:"pointer",fontWeight:900,fontFamily:"inherit"}}>−</button>\n                  <span style={{fontSize:22,fontWeight:900,color:"#1e293b",minWidth:28,textAlign:"center"}}>{e.abs}</span>\n                  <button onClick={()=>setEleves(eleves.map(el=>el.id===e.id?{...el,abs:el.abs+1}:el))}\n                    style={{width:36,height:36,borderRadius:"50%",border:"none",background:"#f0fdf4",color:"#16a34a",fontSize:20,cursor:"pointer",fontWeight:900,fontFamily:"inherit"}}>+</button>\n                </div>\n              </div>\n            </Card>\n            <div style={{display:"flex",flexDirection:"column",gap:14}}>\n              <Card>\n                <h3 style={{fontSize:15,fontWeight:800,marginBottom:12,color:"#374151"}}>Résultats par matière</h3>\n                {MAT.map(m=>{const ma=avg(TRI.map(t=>notes[e.id]?.[m]?.[t]).filter(n=>n!=null));return(\n                  <div key={m} style={{marginBottom:9}}>\n                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>\n                      <span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{m}</span>\n                      <span style={{fontSize:13,fontWeight:700,color:ma?nCol(ma):"#9ca3af"}}>{ma?`${ma}/20`:"—"}</span>\n                    </div>\n                    {ma&&<BarEl value={ma} color={MC[m]}/>}\n                  </div>\n                );})}\n              </Card>\n              <Card>\n                <h3 style={{fontSize:14,fontWeight:800,marginBottom:10,color:"#374151"}}>📚 Devoirs récents</h3>\n                {devoirs.slice(-5).map(d=>{const f=d.fait[e.id];return(\n                  <div key={d.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #f8fafc",fontSize:13}}>\n                    <span style={{fontSize:15}}>{f?"✅":"❌"}</span>\n                    <span style={{flex:1,fontWeight:600,color:"#374151"}}>{d.titre}</span>\n                    <Bdg c={MC[d.mat]||"#6366f1"} sm>{d.mat}</Bdg>\n                  </div>\n                );})}\n              </Card>\n            </div>\n          </div>\n        )}\n\n        {/* ── Notes ── */}\n        {fTab==="notes" && (\n          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>\n            {TRI.map(t=>{\n              const tN=MAT.map(m=>notes[e.id]?.[m]?.[t]).filter(n=>n!=null); const tA=avg(tN);\n              return (\n                <Card key={t}>\n                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>\n                    <h3 style={{fontWeight:800,fontSize:15,color:"#374151"}}>Trimestre {t.replace("T","")}</h3>\n                    {tA?<Bdg c={nCol(tA)}>{tA}/20</Bdg>:<span style={{color:"#9ca3af"}}>—</span>}\n                  </div>\n                  {MAT.map(m=>{const n=notes[e.id]?.[m]?.[t];return(\n                    <div key={m} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #f8fafc"}}>\n                      <span style={{fontSize:13,color:"#6b7280",fontWeight:600}}>{m}</span>\n                      {n!=null?<span style={{fontWeight:700,fontSize:13,color:nCol(n),background:nBg(n),padding:"2px 8px",borderRadius:7}}>{n}/20</span>:<span style={{color:"#d1d5db"}}>—</span>}\n                    </div>\n                  );})}\n                </Card>\n              );\n            })}\n          </div>\n        )}\n\n        {/* ── Santé ── */}\n        {fTab==="sante" && (\n          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>\n            <Card>\n              <h3 style={{fontSize:15,fontWeight:800,marginBottom:16,color:"#374151"}}>🚑 Informations médicales</h3>\n              <FRow label="🚨 Allergies">\n                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>\n                  {(s.al||[]).map(al=>(\n                    <span key={al} onClick={()=>upS(e.id,"al",s.al.filter(x=>x!==al))}\n                      style={{cursor:"pointer",padding:"4px 10px",borderRadius:16,background:"#fee2e2",color:"#dc2626",fontSize:12,fontWeight:700}}>\n                      🚨 {al} ×\n                    </span>\n                  ))}\n                  {!s.al?.length&&<span style={{color:"#9ca3af",fontSize:13}}>Aucune allergie connue</span>}\n                </div>\n                <input placeholder="Taper une allergie + Entrée pour ajouter" style={inp}\n                  onKeyDown={ev=>{if(ev.key==="Enter"&&ev.target.value.trim()){upS(e.id,"al",[...(s.al||[]),ev.target.value.trim()]);ev.target.value="";}}}/>\n              </FRow>\n              <FRow label="Médicaments & traitements">\n                <textarea value={s.med||""} onChange={ev=>upS(e.id,"med",ev.target.value)}\n                  placeholder="Ex : Ventoline (asthme), Ritaline (matin)…" rows={2} style={{...inp,resize:"vertical"}}/>\n              </FRow>\n              <FRow label="Régime alimentaire">\n                <select value={s.reg||"Aucun"} onChange={ev=>upS(e.id,"reg",ev.target.value)} style={inp}>\n                  {REGIMES.map(r=><option key={r}>{r}</option>)}\n                </select>\n              </FRow>\n              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>\n                {[["vue","👓 Problèmes de vue"],["aud","👂 Problèmes d\'audition"]].map(([k,l])=>(\n                  <label key={k} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"10px 14px",borderRadius:10,background:s[k]?"#fef9c3":"#f8fafc",border:`1.5px solid ${s[k]?"#d97706":"#e2e8f0"}`}}>\n                    <input type="checkbox" checked={!!s[k]} onChange={ev=>upS(e.id,k,ev.target.checked)} style={{width:16,height:16}}/>\n                    <span style={{fontSize:13,fontWeight:600,color:"#374151"}}>{l}</span>\n                  </label>\n                ))}\n              </div>\n            </Card>\n            <Card>\n              <h3 style={{fontSize:15,fontWeight:800,marginBottom:16,color:"#374151"}}>📋 Suivi pédagogique spécialisé</h3>\n              <FRow label="Troubles DYS & autres">\n                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>\n                  {(s.dys||[]).map(d=>(\n                    <span key={d} onClick={()=>upS(e.id,"dys",s.dys.filter(x=>x!==d))}\n                      style={{cursor:"pointer",padding:"4px 10px",borderRadius:16,background:"#eff6ff",color:"#3b82f6",fontSize:12,fontWeight:700}}>\n                      {d} ×\n                    </span>\n                  ))}\n                  {!s.dys?.length&&<span style={{color:"#9ca3af",fontSize:13}}>Aucun trouble signalé</span>}\n                </div>\n                <select onChange={ev=>{if(ev.target.value&&!(s.dys||[]).includes(ev.target.value)){upS(e.id,"dys",[...(s.dys||[]),ev.target.value]);}ev.target.value="";}} style={inp}>\n                  <option value="">+ Ajouter un trouble…</option>\n                  {DYS_LIST.map(d=><option key={d}>{d}</option>)}\n                </select>\n              </FRow>\n              <FRow label="Autres suivis spécialisés">\n                <textarea value={s.suivis||""} onChange={ev=>upS(e.id,"suivis",ev.target.value)}\n                  placeholder="Orthophoniste, ergothérapeute, pédopsychiatre…" rows={2} style={{...inp,resize:"vertical"}}/>\n              </FRow>\n              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>\n                {[["pap","📄 PAP","#8b5cf6"],["pai","📋 PAI","#f59e0b"]].map(([k,l,c])=>(\n                  <label key={k} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"12px 14px",borderRadius:10,background:s[k]?c+"18":"#f8fafc",border:`2px solid ${s[k]?c:"#e2e8f0"}`}}>\n                    <input type="checkbox" checked={!!s[k]} onChange={ev=>upS(e.id,k,ev.target.checked)} style={{width:16,height:16}}/>\n                    <span style={{fontSize:14,fontWeight:700,color:s[k]?c:"#374151"}}>{l}</span>\n                  </label>\n                ))}\n              </div>\n              <FRow label="🔒 Notes confidentielles">\n                <textarea value={s.conf||""} onChange={ev=>upS(e.id,"conf",ev.target.value)}\n                  placeholder="Informations importantes à retenir (confidentielles)…" rows={3} style={{...inp,resize:"vertical"}}/>\n              </FRow>\n            </Card>\n          </div>\n        )}\n\n        {/* ── Parents ── */}\n        {fTab==="parents" && (\n          <div style={{display:"flex",flexDirection:"column",gap:14}}>\n            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>\n              {[["👤 Parent / Tuteur 1","p1","t1","e1"],["👤 Parent / Tuteur 2","p2","t2","e2"]].map(([titre,nk,tk,ek])=>(\n                <Card key={nk}>\n                  <h3 style={{fontSize:15,fontWeight:800,marginBottom:14,color:"#374151"}}>{titre}</h3>\n                  <FRow label="Nom complet"><input value={p[nk]||""} onChange={ev=>upP(e.id,nk,ev.target.value)} placeholder="Prénom Nom" style={inp}/></FRow>\n                  <FRow label="Téléphone"><input value={p[tk]||""} onChange={ev=>upP(e.id,tk,ev.target.value)} placeholder="06 XX XX XX XX" style={inp}/></FRow>\n                  <FRow label="Email"><input value={p[ek]||""} onChange={ev=>upP(e.id,ek,ev.target.value)} placeholder="email@exemple.fr" style={inp}/></FRow>\n                  {p[tk]&&(\n                    <a href={`tel:${p[tk]}`} style={{display:"inline-flex",alignItems:"center",gap:8,padding:"8px 16px",borderRadius:10,background:"#f0fdf4",color:"#16a34a",fontSize:13,fontWeight:700,textDecoration:"none",border:"1.5px solid #86efac"}}>\n                      📞 Appeler {p[nk]?.split(" ")[0]||""}\n                    </a>\n                  )}\n                </Card>\n              ))}\n            </div>\n            <Card>\n              <h3 style={{fontSize:15,fontWeight:800,marginBottom:14,color:"#374151"}}>📨 Liaison parents-école</h3>\n              <FRow label="Historique des échanges">\n                <textarea value={p.li||""} onChange={ev=>upP(e.id,"li",ev.target.value)}\n                  placeholder="Notes sur les contacts : appels, réunions, messages reçus et envoyés…" rows={4} style={{...inp,resize:"vertical"}}/>\n              </FRow>\n              <Btn v="ghost" onClick={()=>{setMLia({eid:String(e.id),objet:"",msg:""});setMdl("liaison");}}>✉️ Rédiger une fiche de liaison</Btn>\n            </Card>\n          </div>\n        )}\n\n        {/* ── Compétences ── */}\n        {fTab==="comps" && (\n          <div style={{display:"flex",flexDirection:"column",gap:14}}>\n            {Object.entries(COMPS).map(([mat,cs])=>(\n              <Card key={mat}>\n                <h3 style={{fontSize:15,fontWeight:800,marginBottom:12,color:MC[mat]||"#374151"}}>{mat}</h3>\n                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>\n                  {cs.map(c=>{const v=comps[e.id]?.[mat]?.[c]||"En cours";return(\n                    <div key={c} style={{background:cBg(v),border:`1.5px solid ${cCol(v)}44`,borderRadius:10,padding:"10px 12px"}}>\n                      <div style={{fontSize:12,color:"#6b7280",marginBottom:6,fontWeight:600}}>{c}</div>\n                      <select value={v} onChange={ev=>upC(e.id,mat,c,ev.target.value)}\n                        style={{background:"transparent",color:cCol(v),border:"none",padding:0,cursor:"pointer",fontWeight:700,fontSize:13,fontFamily:"inherit",outline:"none",width:"100%"}}>\n                        {NIV_C.map(n=><option key={n}>{n}</option>)}\n                      </select>\n                    </div>\n                  );})}\n                </div>\n              </Card>\n            ))}\n            <div style={{display:"flex",gap:12}}>\n              {NIV_C.map(n=><div key={n} style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}><div style={{width:12,height:12,borderRadius:3,background:cBg(n),border:`1.5px solid ${cCol(n)}`}}/><span style={{color:"#374151",fontWeight:600}}>{n}</span></div>)}\n            </div>\n          </div>\n        )}\n\n        {/* ── Lecture ── */}\n        {fTab==="lecture" && (\n          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>\n            <Card>\n              <h3 style={{fontSize:15,fontWeight:800,marginBottom:14,color:"#374151"}}>📖 Niveau de lecture</h3>\n              <div style={{display:"flex",gap:4,marginBottom:16}}>\n                {NIV_L.map((n,k)=>(\n                  <button key={n} onClick={()=>setLecture(l=>({...l,[e.id]:{...l[e.id],niv:n}}))}\n                    style={{flex:1,padding:"8px 4px",borderRadius:9,border:"2px solid",borderColor:eL.niv===n?NC[k]:"#e2e8f0",background:eL.niv===n?NC[k]+"18":"#fff",color:eL.niv===n?NC[k]:"#9ca3af",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>\n                    {n.split(" ")[0]}\n                  </button>\n                ))}\n              </div>\n              <div style={{background:NC[niL]+"18",borderRadius:12,padding:"12px 16px",marginBottom:16}}>\n                <div style={{fontWeight:700,fontSize:14,color:NC[niL]}}>{eL.niv||"—"}</div>\n                <div style={{display:"flex",gap:4,marginTop:8}}>\n                  {NIV_L.map((_,k)=><div key={k} style={{flex:1,height:6,borderRadius:3,background:k<=niL?NC[niL]:"#e5e7eb"}}/>)}\n                </div>\n              </div>\n              <FRow label="Vitesse de lecture (mots/min)">\n                <input type="number" value={eL.vit||""} onChange={ev=>setLecture(l=>({...l,[e.id]:{...l[e.id],vit:parseInt(ev.target.value)||0}}))} style={inp}/>\n              </FRow>\n            </Card>\n            <Card>\n              <h3 style={{fontSize:15,fontWeight:800,marginBottom:14,color:"#374151"}}>📝 Observations</h3>\n              <textarea value={eL.obs||""} onChange={ev=>setLecture(l=>({...l,[e.id]:{...l[e.id],obs:ev.target.value}}))}\n                placeholder="Difficultés rencontrées, points forts, axes de progrès, méthodes utilisées…" rows={8}\n                style={{...inp,resize:"vertical"}}/>\n            </Card>\n          </div>\n        )}\n\n        {/* ── Discipline ── */}\n        {fTab==="disc" && (\n          <div>\n            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>\n              <h3 style={{fontSize:15,fontWeight:800,color:"#374151"}}>{eD.length} incident(s) enregistré(s)</h3>\n              <Btn v="red" sm onClick={()=>{setMDi({...mDi,eid:String(e.id)});setMdl("disc");}}>+ Signaler</Btn>\n            </div>\n            {eD.length===0&&<Card><div style={{textAlign:"center",padding:"40px 0",color:"#9ca3af",fontSize:14}}>Aucun incident — élève exemplaire 🌟</div></Card>}\n            <div style={{display:"flex",flexDirection:"column",gap:10}}>\n              {[...eD].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(d=>(\n                <Card key={d.id} style={{borderLeft:`4px solid ${gCol(d.grav)}`}}>\n                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,flexWrap:"wrap",gap:6}}>\n                    <div style={{display:"flex",gap:7}}><Bdg c={gCol(d.grav)}>{gLbl(d.grav)}</Bdg><Bdg c="#94a3b8">{d.type}</Bdg></div>\n                    <span style={{fontSize:12,color:"#9ca3af"}}>{fmtD(d.date)}</span>\n                  </div>\n                  <p style={{fontSize:14,color:"#374151",marginBottom:d.sanct?6:0}}>{d.desc}</p>\n                  {d.sanct&&<p style={{fontSize:13,color:"#6b7280",fontStyle:"italic"}}>✏️ Sanction : {d.stxt}</p>}\n                </Card>\n              ))}\n            </div>\n          </div>\n        )}\n\n        {/* ── RDV ── */}\n        {fTab==="rdv" && (\n          <div>\n            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>\n              <h3 style={{fontSize:15,fontWeight:800,color:"#374151"}}>{eR.length} rendez-vous</h3>\n              <Btn sm onClick={()=>{setMRdv({...mRdv,eid:String(e.id)});setMdl("rdv");}}>+ Ajouter</Btn>\n            </div>\n            {eR.length===0&&<Card><div style={{textAlign:"center",padding:"40px 0",color:"#9ca3af"}}>Aucun rendez-vous enregistré</div></Card>}\n            <div style={{display:"flex",flexDirection:"column",gap:10}}>\n              {[...eR].sort((a,b)=>new Date(a.date)-new Date(b.date)).map(r=>{\n                const past=new Date(r.date)<new Date();\n                const stC=r.statut==="Confirmé"?"#16a34a":r.statut==="Annulé"?"#dc2626":"#f59e0b";\n                return (\n                  <Card key={r.id} style={{display:"flex",gap:14,opacity:past?.65:1}}>\n                    <div style={{background:"#f5f3ff",borderRadius:10,padding:"8px 12px",textAlign:"center",minWidth:52}}>\n                      <div style={{fontSize:16,fontWeight:900,color:"#6366f1"}}>{new Date(r.date).getDate()}</div>\n                      <div style={{fontSize:9,fontWeight:700,color:"#8b5cf6",textTransform:"uppercase"}}>{new Date(r.date).toLocaleDateString("fr-FR",{month:"short"})}</div>\n                      {r.h&&<div style={{fontSize:10,color:"#9ca3af"}}>{r.h}</div>}\n                    </div>\n                    <div style={{flex:1}}>\n                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>\n                        <span style={{fontWeight:800,fontSize:14,color:"#1e293b"}}>{r.type}</span>\n                        <Bdg c={stC}>{r.statut}</Bdg>\n                        {past&&<Bdg c="#9ca3af">Passé</Bdg>}\n                      </div>\n                      {r.lieu&&<p style={{fontSize:13,color:"#6b7280",marginBottom:2}}>📍 {r.lieu}</p>}\n                      {r.motif&&<p style={{fontSize:13,color:"#374151",fontStyle:"italic"}}>{r.motif}</p>}\n                    </div>\n                  </Card>\n                );\n              })}\n            </div>\n          </div>\n        )}\n\n        {/* ── Appréciations ── */}\n        {fTab==="appre" && (\n          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>\n            {TRI.map(t=>{\n              const tN=MAT.map(m=>notes[e.id]?.[m]?.[t]).filter(n=>n!=null); const tA=avg(tN);\n              return (\n                <Card key={t}>\n                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>\n                    <h3 style={{fontWeight:800,fontSize:15,color:"#374151"}}>Trimestre {t.replace("T","")}</h3>\n                    {tA?<Bdg c={nCol(tA)}>{tA}/20</Bdg>:<span style={{color:"#9ca3af"}}>—</span>}\n                  </div>\n                  <textarea\n                    value={appre[e.id]?.[t]||""}\n                    onChange={ev=>setAppre(a=>({...a,[e.id]:{...a[e.id],[t]:ev.target.value}}))}\n                    placeholder={`Appréciation générale du trimestre ${t.replace("T","")}…\\n\\nEx : ${e.pre} est un élève sérieux qui progresse bien…`}\n                    rows={8}\n                    style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:13,fontFamily:"inherit",resize:"none",outline:"none",color:"#374151",lineHeight:1.6,boxSizing:"border-box"}}\n                  />\n                  <div style={{fontSize:11,color:"#9ca3af",marginTop:4,textAlign:"right"}}>\n                    {(appre[e.id]?.[t]||"").length} caractères\n                  </div>\n                </Card>\n              );\n            })}\n          </div>\n        )}\n      </div>\n    );\n  };\n\n  // ══════════════════════════════════════════════════════════════════════════════\n  // RENDU GLOBAL\n  // ══════════════════════════════════════════════════════════════════════════════\n  const NAV = [\n    {k:"accueil",  i:"🏠", l:"Accueil"},\n    {k:"eleves",   i:"👧", l:"Élèves & Plan"},\n    {k:"notes",    i:"📝", l:"Notes"},\n    {k:"devoirs",  i:"📚", l:"Devoirs"},\n    {k:"disc",     i:"⚠️", l:"Discipline"},\n    {k:"rdv",      i:"🏥", l:"Rendez-vous"},\n    {k:"agenda",   i:"📅", l:"Agenda & Sorties"},\n    {k:"fiche",    i:"🎓", l:"Bulletins"},\n  ];\n\n  const renderPage = () => {\n    switch(pg) {\n      case "accueil": return <PageAccueil/>;\n      case "eleves":  return <PageEleves/>;\n      case "notes":   return <PageNotes/>;\n      case "devoirs": return <PageDevoirs/>;\n      case "disc":    return <PageDisc/>;\n      case "rdv":     return <PageRdv/>;\n      case "agenda":  return <PageAgenda/>;\n      case "fiche":   return fId ? <PageFiche/> : <PageEleves/>;\n      default:        return <PageAccueil/>;\n    }\n  };\n\n  return (\n    <>\n      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>\n      <Modals/>\n      <div style={{fontFamily:"\'Inter\',sans-serif",background:"#f8f9ff",minHeight:"100vh",display:"flex",color:"#1e293b"}}>\n\n        {/* Barre latérale */}\n        <div style={{width:220,background:"#fff",borderRight:"1px solid #e8ecf4",minHeight:"100vh",display:"flex",flexDirection:"column",flexShrink:0,boxShadow:"2px 0 8px rgba(0,0,0,.03)"}}>\n          <div style={{padding:"20px 18px 16px",borderBottom:"1px solid #f1f5f9"}}>\n            <div style={{display:"flex",alignItems:"center",gap:10}}>\n              <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🍎</div>\n              <div>\n                <div style={{fontSize:15,fontWeight:900,color:"#1e293b",letterSpacing:-.3}}>MaClasse</div>\n                <div style={{fontSize:11,color:"#9ca3af"}}>CM1 · {eleves.length} élèves</div>\n              </div>\n            </div>\n          </div>\n\n          <nav style={{flex:1,padding:"12px 10px"}}>\n            {NAV.map(n=>(\n              <button key={n.k} onClick={()=>{setPg(n.k); if(n.k==="fiche")setPg("eleves");}}\n                style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:10,border:"none",cursor:"pointer",fontSize:13,fontWeight:(pg===n.k||(pg==="fiche"&&n.k==="fiche"))?700:500,background:(pg===n.k||(pg==="fiche"&&n.k==="fiche"))?"#f5f3ff":"transparent",color:(pg===n.k||(pg==="fiche"&&n.k==="fiche"))?"#6366f1":"#374151",fontFamily:"inherit",textAlign:"left",marginBottom:2,transition:"all .15s"}}>\n                <span style={{fontSize:16,flexShrink:0}}>{n.i}</span>\n                <span>{n.l}</span>\n              </button>\n            ))}\n          </nav>\n\n          <div style={{padding:"14px 16px",borderTop:"1px solid #f1f5f9",background:"#fafbff"}}>\n            <div style={{fontSize:10,color:"#9ca3af",marginBottom:4,fontWeight:600,textTransform:"uppercase",letterSpacing:.4}}>Moyenne de la classe</div>\n            <div style={{fontSize:26,fontWeight:900,color:ca?nCol(ca):"#1e293b"}}>{ca?`${ca}/20`:"—"}</div>\n            <div style={{display:"flex",gap:8,marginTop:8,marginBottom:10}}>\n              <span style={{fontSize:11,background:"#eff6ff",color:"#3b82f6",padding:"3px 8px",borderRadius:8,fontWeight:700}}>{pap} PAP</span>\n              <span style={{fontSize:11,background:"#fefce8",color:"#d97706",padding:"3px 8px",borderRadius:8,fontWeight:700}}>{pai} PAI</span>\n            </div>\n            <div style={{fontSize:11,color:"#16a34a",fontWeight:600,marginBottom:8,display:"flex",alignItems:"center",gap:5}}>\n              <span>✅</span> Données sauvegardées\n            </div>\n            <button onClick={()=>{if(window.confirm("Remettre toutes les données à zéro ?")){["eleves","notes","devoirs","disc","rdv","sorties","edt","sante","parents","appre","lecture","comps"].forEach(k=>localStorage.removeItem("mc_"+k));window.location.reload();}}} style={{width:"100%",padding:"6px 0",borderRadius:8,border:"1px solid #fca5a5",background:"#fff5f5",color:"#dc2626",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>\n              🗑️ Réinitialiser les données\n            </button>\n          </div>\n        </div>\n\n        {/* Contenu principal */}\n        <main style={{flex:1,padding:"28px 32px",overflowY:"auto"}}>\n          {renderPage()}\n        </main>\n      </div>\n    </>\n  );\n}\n';

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function init() {
  try {
    document.getElementById('pct').textContent = 'Chargement de React...';
    await loadScript('https://unpkg.com/react@18.2.0/umd/react.production.min.js');
    await loadScript('https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js');
    
    document.getElementById('pct').textContent = 'Chargement du compilateur...';
    await loadScript('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js');
    
    document.getElementById('pct').textContent = 'Compilation de l'application (30 sec.)...';
    
    // Use setTimeout to allow UI to update before heavy compilation
    await new Promise(r => setTimeout(r, 50));
    
    const { useState, useMemo, useEffect, useRef } = React;
    
    const result = Babel.transform(APP_CODE, {
      presets: [['react', {pragma: 'React.createElement', pragmaFrag: 'React.Fragment'}]],
      plugins: [],
      filename: 'app.jsx',
      compact: false
    });
    
    document.getElementById('pct').textContent = 'Démarrage...';
    
    // Create a function from the compiled code
    const fn = new Function('React', 'useState', 'useMemo', 'useEffect', 'useRef', result.code + '\nreturn App;');
    const App = fn(React, useState, useMemo, useEffect, useRef);
    
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    
  } catch(e) {
    document.getElementById('root').innerHTML = '<div style="padding:30px;font-family:monospace;color:#dc2626;font-size:13px"><strong>Erreur:</strong><br>' + e.message + '</div>';
    console.error(e);
  }
}

init();
</script>
</body>
</html>
